<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hina & Artur</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <img src="/static/logo.png" class="logo-img" alt="logo">
                <h1>Tactical Japanese</h1>
            </div>
            
            <nav>
                <a href="#" class="nav-item active"><img class="icon-img" src="/static/home.png" alt="home"> Home</a>
                <a href="#" class="nav-item"><span class="icon">📖</span> Words</a>
                <button class="mobile-add-btn">+</button> 
                <a href="#" class="nav-item"><span class="icon">❓</span> Quiz</a>
                <a href="#" class="nav-item"><span class="icon">⭐</span> Favorites</a>
            </nav>

            <div class="hina-profile">
                <div class="hina-avatar">👩‍🏫</div>
                <div class="div">
                    <strong>Hina Sensei<span class="sakura">🌸</span></strong>
                    <p class="japan">がんばって！</p>
                    <p class="text">You can do it!<span class="sakura">🌸</span></p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <h1 class="page-title">Tactical Japanese <span class="sakura">🌸</span></h1>
                <p class="subtitle">Learn Japanese vocabulary with Hina Sensei ❤️</p>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📚</div>
                    <div>
                        <div class="stat-number" id="total-words">124</div>
                        <div class="stat-label">Total Words</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div>
                        <div class="stat-number" id="learned">38</div>
                        <div class="stat-label">Learned</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏳</div>
                    <div>
                        <div class="stat-number" id="learning">72</div>
                        <div class="stat-label">Learning</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔄</div>
                    <div>
                        <div class="stat-number" id="repeat">14</div>
                        <div class="stat-label">Repeat</div>
                    </div>
                </div>
            </div>

            <div class="add-card">
                <div class="text">
                    <h2>Add New Word</h2>
                </div>
                <div class="buttons">
                    <input type="text" id="japanese" placeholder="Japanese word">
                    <input type="text" id="reading" placeholder="Reading">
                    <input type="text" id="translation" placeholder="Translation">
                    <button onclick="addWord()">Add Word</button>
                </div>
            </div>

            <div class="words-header">
                <input type="text" id="search" placeholder="Search words..." onkeyup="filterWords()">
                <select id="status-filter" onchange="filterWords()">
                    <option value="">All Status</option>
                    <option value="Learned">Learned</option>
                    <option value="Learning">Learning</option>
                    <option value="Repeat">Repeat</option>
                </select>
            </div>

            <div id="words" class="words-grid"></div>
            <div id="pagination" class="pagination-container"></div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
